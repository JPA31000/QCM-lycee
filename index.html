<html lang="fr">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Questionnaire – Climat relationnel au lycée</title>
<style>

@import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=DM+Sans:wght@400;500;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{font-family:'DM Sans',sans-serif;color:#57534e;background:linear-gradient(160deg,#fff7ed 0%,#fff1f2 52%,#fff7ed 100%);min-height:100vh;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
.screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:clamp(1rem,4vw,2rem)}
.screen--top{align-items:flex-start}
.card{background:#fff;border-radius:clamp(18px,4vw,26px);padding:clamp(1.5rem,5vw,2.75rem) clamp(1.25rem,4.5vw,2.5rem);width:100%;box-shadow:0 18px 48px rgba(234,88,12,0.13),0 2px 8px rgba(60,42,33,0.05)}
.qcard{animation:fadeUp .45s cubic-bezier(.4,0,.2,1) both}
.stagger>*{animation:fadeUp .5s cubic-bezier(.4,0,.2,1) both}
.stagger>*:nth-child(1){animation-delay:.04s}.stagger>*:nth-child(2){animation-delay:.09s}.stagger>*:nth-child(3){animation-delay:.14s}.stagger>*:nth-child(4){animation-delay:.19s}.stagger>*:nth-child(5){animation-delay:.24s}.stagger>*:nth-child(6){animation-delay:.29s}.stagger>*:nth-child(7){animation-delay:.34s}.stagger>*:nth-child(8){animation-delay:.39s}
button{font-family:'DM Sans',sans-serif;transition:transform .12s ease,box-shadow .2s ease,background .2s ease,border-color .2s ease,color .2s ease}
button:not(:disabled){cursor:pointer}
button:not(:disabled):active{transform:scale(.975)}
@media(hover:hover){.lift:not(:disabled):hover{transform:translateY(-1px)}}
input,textarea{font-family:'DM Sans',sans-serif}
h1,h2,h3{font-family:'Fraunces',Georgia,serif}
:focus{outline:none}
:focus-visible{outline:2.5px solid #ea580c;outline-offset:2px;border-radius:8px}
.pop{animation:pop .3s cubic-bezier(.34,1.56,.64,1)}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
@keyframes pop{0%{transform:scale(.5);opacity:.4}60%{transform:scale(1.18)}100%{transform:scale(1);opacity:1}}
.slider-input{-webkit-appearance:none;appearance:none;width:100%;height:34px;background:transparent;cursor:pointer;position:absolute;top:-7px;left:0;margin:0;opacity:0;z-index:2}
.slider-input::-webkit-slider-thumb{-webkit-appearance:none;width:38px;height:38px}
.slider-input::-moz-range-thumb{width:38px;height:38px;border:none}
@media(max-width:430px){.slider-tick--mid{display:none}}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition-duration:.01ms!important}}


.opt-btn{padding:.85rem 1.2rem;border-radius:12px;border:2px solid #ece5df;background:#fff;color:#57534e;font-size:.97rem;font-weight:400;text-align:left;width:100%;display:flex;align-items:center;gap:.7rem;transition:all .18s}
.opt-btn.sel{border:2px solid #ea580c;background:#fff3ec;color:#9a3412;font-weight:600;box-shadow:0 0 0 4px #fdba7455}
.opt-btn:disabled{background:#faf6f2;color:#a8a29e;cursor:not-allowed;box-shadow:none}
.cbx{width:18px;height:18px;border-radius:5px;border:2px solid #d6cdc5;background:transparent;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.cbx.sel{border:none;background:#ea580c}
.btn-pill{border-radius:99px;font-weight:600;font-size:.9rem;padding:.8rem 1.4rem;background:transparent;border:2px solid #ece5df;color:#7c6f64}
.btn-pill:disabled{color:#d6cdc5;cursor:not-allowed}
.next-btn{flex:0 1 auto;background:linear-gradient(135deg,#ea580c,#fb923c);color:#fff;border:none;padding:.85rem 2rem;border-radius:99px;font-weight:700;font-size:.95rem;box-shadow:0 6px 18px rgba(234,88,12,.32);text-shadow:0 1px 2px rgba(120,40,0,.25)}
.next-btn:disabled{background:#ece5df;color:#a8a29e;box-shadow:none;text-shadow:none;cursor:not-allowed}
.cta{width:100%;background:linear-gradient(135deg,#ea580c,#fb923c);color:#fff;border:none;padding:1.05rem 2.5rem;border-radius:99px;font-weight:700;font-size:1.02rem;box-shadow:0 8px 22px rgba(234,88,12,.38);text-shadow:0 1px 2px rgba(120,40,0,.25);margin-bottom:.8rem}
.resume{width:100%;background:transparent;border:2px solid #ece5df;color:#7c6f64;padding:.85rem;border-radius:99px;font-weight:600;font-size:.9rem}
.transmit{width:100%;padding:1rem 1.5rem;border-radius:12px;border:none;background:linear-gradient(135deg,#ea580c,#fb923c);color:#fff;font-weight:700;font-size:1rem;box-shadow:0 6px 18px rgba(234,88,12,.32);text-shadow:0 1px 2px rgba(120,40,0,.25);margin-bottom:.7rem;display:flex;align-items:center;justify-content:center;gap:.5rem}
.dl{width:100%;padding:.85rem 1.5rem;border-radius:12px;border:2px solid #ece5df;background:transparent;color:#7c6f64;font-weight:600;font-size:.92rem;margin-bottom:.9rem;display:flex;align-items:center;justify-content:center;gap:.5rem}
.restart{width:100%;padding:.9rem 1.5rem;border-radius:12px;border:2px solid #ece5df;background:transparent;color:#7c6f64;font-weight:600;font-size:.97rem}

</style>

  function esc(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

  function saveToStorage(answers){
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify({ answers: answers, savedAt: new Date().toISOString() })); return true; }

  function loadFromStorage(){

  // Code identifiant aléatoire : 3 lettres + 3 chiffres (I et O exclus)
  function randomCode(){
    var L = "ABCDEFGHJKLMNPQRSTUVWXYZ", D = "0123456789";
    function pick(s,n){ var o=""; for(var i=0;i<n;i++) o += s[Math.floor(Math.random()*s.length)]; return o; }
    return pick(L,3) + pick(D,3);
  }

  // ====== MARQUEUR + ENCODAGE PDF ======
  var DATA_MARKER = "CLIMAT_DATA_V1:";
  function encodeB64(str){ return btoa(unescape(encodeURIComponent(str))); }
  function decodeB64(b64){ return decodeURIComponent(escape(atob(b64))); }

  function loadScript(srcUrl, globalReady){
    return new Promise(function(resolve, reject){
      if(globalReady()) return resolve();
      var s = document.createElement("script");
      s.src = srcUrl; s.async = true;
      s.onload = function(){
        (async function(){
          for(var i=0;i<60;i++){ if(globalReady()) return resolve(); await new Promise(function(r){ setTimeout(r,50); }); }
          reject(new Error("Global indisponible après chargement de " + srcUrl));
        })();
      };
      s.onerror = function(){ reject(new Error("Échec du chargement de " + srcUrl)); };
      document.head.appendChild(s);
    });
  }

  function downloadBlob(blob, filename){
    var url = URL.createObjectURL(blob);
    try {
      var a = document.createElement("a");
      a.href = url; a.download = filename; a.rel = "noopener";
      document.body.appendChild(a); a.click(); a.remove();
    } catch(e){ window.open(url, "_blank"); }
    setTimeout(function(){ URL.revokeObjectURL(url); }, 4000);
  }

  function formatAnswer(q, answer){
    if(!answer && answer !== 0) return "—";
    if(q.type === "text") return answer || "—";
    if(q.type === "single" || q.type === "slider") return answer;
    if(q.type === "multi" || q.type === "multi_with_none"){
      var vals = Array.isArray(answer) ? answer : [];
      if(vals.indexOf("__none__") !== -1) return q.noneOption || "Aucune";
      return vals.length ? vals.join(", ") : "—";
    }
    if(q.type === "grid"){
      return q.rows.map(function(row){ return row + " : " + (answer[row] || "—"); }).join("\n");
    }
    return "—";
  }

    var pageW = 210, margin = 16, contentW = pageW - margin * 2, y = 20;
    function addPage(){ doc.addPage(); y = 20; }
    function checkY(needed){ if(y + needed > 280) addPage(); }

    doc.setFillColor(99, 102, 241);
    doc.roundedRect(margin, y, contentW, 22, 4, 4, "F");
    doc.setTextColor(255, 255, 255);
    doc.setFont("helvetica", "bold"); doc.setFontSize(13);
    doc.text("Questionnaire – Climat relationnel au lycée", margin + 6, y + 9);
    doc.setFont("helvetica", "normal"); doc.setFontSize(8);
    var date = new Date().toLocaleDateString("fr-FR", { day: "2-digit", month: "long", year: "numeric" });
    doc.text("Réponses du " + date + "  ·  Code " + studentId + "  ·  Questionnaire anonyme", margin + 6, y + 17);
    y += 28;

    var lastSection = "";
    QUESTIONS.forEach(function(q){
      if(q.id === "lesquelles" && answers["connait_ressources"] === "Non") return;
      var ans = formatAnswer(q, answers[q.id]);
      var ansLines = q.type === "grid" ? ans.split("\n") : doc.splitTextToSize(ans, contentW - 14);
      var qLines = doc.splitTextToSize(q.question, contentW - 12);
      var qH = qLines.length * 4.6;
      var ansBoxH = ansLines.length * 5.2 + 4;
      var blockH = 6 + qH + 3 + ansBoxH + 5;

      checkY(blockH + 12);

      if(q.section !== lastSection){
        lastSection = q.section;
        checkY(16);
        doc.setFont("helvetica", "bold"); doc.setFontSize(8);
        doc.setTextColor(99, 102, 241);
        doc.text(q.section.toUpperCase(), margin, y); y += 5;
        doc.setDrawColor(99, 102, 241); doc.setLineWidth(0.4);
        doc.line(margin, y, margin + contentW, y); y += 5;
      }

      doc.setFillColor(249, 250, 251);
      doc.roundedRect(margin, y, contentW, blockH, 3, 3, "F");
      doc.setFillColor(99, 102, 241);
      doc.roundedRect(margin, y, 3, blockH, 1.5, 1.5, "F");

      doc.setFont("helvetica", "bold"); doc.setFontSize(9);
      doc.setTextColor(30, 27, 75);
      doc.text(qLines, margin + 7, y + 6);

      var ansBoxY = y + 6 + qH;
      doc.setFillColor(255, 255, 255);
      doc.setDrawColor(229, 231, 235); doc.setLineWidth(0.3);
      doc.roundedRect(margin + 7, ansBoxY, contentW - 14, ansBoxH, 2, 2, "FD");
      doc.setFont("helvetica", "normal"); doc.setFontSize(9);
      doc.setTextColor(55, 65, 81);
      doc.text(ansLines, margin + 10, ansBoxY + 5);

      y += blockH + 4;
    });

    var pageCount = doc.getNumberOfPages();
    for(var i = 1; i <= pageCount; i++){
      doc.setPage(i);
      doc.setFont("helvetica", "normal"); doc.setFontSize(7);
      doc.setTextColor(156, 163, 175);
      doc.text("Document généré automatiquement · Page " + i + "/" + pageCount, pageW / 2, 291, { align: "center" });
    }

    var blob = doc.output("blob");
    var datauri = doc.output("datauristring");
    var base64 = datauri.indexOf(",") !== -1 ? datauri.split(",")[1] : "";
    return { blob: blob, base64: base64, filename: "climat-" + studentId + ".pdf" };
  }

  // Envoi par FORMULAIRE CACHÉ vers un IFRAME (et non par fetch).
  // Pourquoi : les Web Apps Apps Script ne renvoient pas d'en-tête CORS, et la
  // page hôte (ex. bloc HTML Wix dans un iframe sandboxé) bloque souvent les
  // requêtes fetch sortantes via sa politique de sécurité (connect-src).
  // Une soumission de formulaire ciblant un iframe est une NAVIGATION, pas une
  // requête fetch : elle n'est pas soumise au CORS et passe la CSP. Le POST
  // atteint le serveur (le fichier est créé dans le Drive). La réponse, dans
  // l'iframe, reste illisible (autre origine) : on considère le chargement de
  // l'iframe comme un succès. Repli en cas d'échec total : le dépôt manuel.
  function uploadViaForm(endpoint, fields){
    return new Promise(function(resolve, reject){
      var name = "climat_up_" + Date.now();
      var iframe = document.createElement("iframe");
      iframe.name = name; iframe.style.display = "none";
      document.body.appendChild(iframe);

      var form = document.createElement("form");
      form.action = endpoint; form.method = "POST"; form.target = name;
      form.style.display = "none";
      Object.keys(fields).forEach(function(k){
        var inp = document.createElement("input");
        inp.type = "hidden"; inp.name = k; inp.value = fields[k];
        form.appendChild(inp);
      });
      document.body.appendChild(form);

      var done = false;
      function finish(ok, err){
        if(done) return; done = true;
        setTimeout(function(){ try { form.remove(); iframe.remove(); } catch(e){} }, 1500);
        ok ? resolve({ ok: true }) : reject(err || new Error("Échec de l'envoi"));
      }
      // L'iframe se charge une fois la réponse du serveur reçue → succès.
      iframe.addEventListener("load", function(){ finish(true); });
      // Filet de sécurité si l'événement load ne se déclenche pas.
      setTimeout(function(){ finish(true); }, 9000);

      try { form.submit(); }
      catch(e){ finish(false, e); }
    });
  }

  // Transmet le PDF au Drive via le Web App Apps Script (anonyme, sans connexion élève)
  async function uploadPdf(answers, studentId){
    var r = await buildPdf(answers, studentId);
    return uploadViaForm(UPLOAD_ENDPOINT, {
      filename: r.filename,
      code: String(studentId),
      mime: "application/pdf",
      data: r.base64
    });
  }

  // ====== ÉCHELLE COULEUR ======
  function scaleColor(t){
    var stops = [[239,68,68],[249,115,22],[234,179,8],[132,204,22],[34,197,94]];
    var x = Math.max(0, Math.min(1, t)) * (stops.length - 1);
    var i = Math.min(stops.length - 2, Math.floor(x));
    var f = x - i;
    var c = stops[i].map(function(a, k){ return Math.round(a + (stops[i+1][k] - a) * f); });
    return "rgb(" + c[0] + "," + c[1] + "," + c[2] + ")";
  }
  var SCALE_EMOJIS = ["😟","😕","😐","🙂","😊"];

  // ====== OPTION « AUTRE » ======
  var OTHER = "Autre";
  function isOther(v){ return typeof v === "string" && (v === OTHER || v.indexOf(OTHER + " :") === 0); }
  function otherTextOf(v){ return isOther(v) ? v.replace(/^Autre\s*:?\s*/, "") : ""; }
  function makeOther(txt){ return (txt && txt.length) ? (OTHER + " : " + txt) : OTHER; }

  var CHECK = '<svg width="11" height="9" viewBox="0 0 11 9" fill="none"><path d="M1 4L4 7L10 1" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>';

    state.savedMsg = "Sauvegardé ✓";

    if(savedTimer) clearTimeout(savedTimer);
    savedTimer = setTimeout(function(){
      state.savedMsg = "";

    }, 2000);

  function saveAndFlash(){

  }

  // ====== VALIDATION ======
  function canContinue(){
    var q = QUESTIONS[state.step], a = state.answers[q.id];
    if(q.type === "text") return true;
    if(q.type === "single" || q.type === "slider") return !!a;
    if(q.type === "multi" || q.type === "multi_with_none") return Array.isArray(a) && a.length > 0;
    if(q.type === "grid") return q.rows.every(function(row){ return a && a[row]; });

  }
  function refreshNext(){ var b = document.getElementById("nextBtn"); if(b) b.disabled = !canContinue(); }

        (done||active ? "linear-gradient(135deg,#fb923c,#ea580c)" : "#ece5df") + ';box-shadow:' +
        (active ? "0 0 0 3px #fed7aa" : "none") + ';transition:all .3s"></span>';
    }
    return '<div style="margin-bottom:.5rem">' +
      '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.5rem;gap:.6rem">' +
        (section ? '<span style="font-size:.74rem;color:#9a3412;background:#fff3ec;font-weight:600;letter-spacing:.04em;text-transform:uppercase;padding:.28rem .7rem;border-radius:99px">' + esc(section) + '</span>' : '') +
        '<span style="font-size:.8rem;color:#7c6f64;font-weight:600;font-variant-numeric:tabular-nums;white-space:nowrap;margin-left:auto">' + current + ' / ' + total + '</span>' +
      '</div>' +

      '<div style="display:flex;flex-wrap:wrap;gap:5px;margin-top:.7rem">' + dots + '</div>' +
    '</div>';

    return '<input type="text" id="otherInput" value="' + attr(text) + '" placeholder="Précise ta réponse…" style="width:100%;margin-top:.5rem;padding:.7rem 1rem;border-radius:10px;border:2px solid #fed7aa;font-size:.95rem;color:#57534e;background:#fff">';

  function sliderHTML(q, val){
    var opts = q.options, n = opts.length;
    var idx = (val !== undefined) ? opts.indexOf(val) : -1;
    var onScale = idx >= 0;
    var optOutSel = q.optOut && val === q.optOut;
    var t = n <= 1 ? 0 : idx / (n - 1);
    var pct = t * 100;
    var C = onScale ? scaleColor(t) : "#d6cdc5";
    var emoji = onScale ? SCALE_EMOJIS[Math.round(t * (SCALE_EMOJIS.length - 1))] : "";
    var head;
    if(onScale) head = '<div class="pop" style="font-size:2.6rem;margin-bottom:.35rem;line-height:1">' + emoji + '</div><div style="font-weight:700;font-size:1.12rem;color:' + C + '">' + esc(val) + '</div>';
    else if(optOutSel) head = '<div style="font-weight:600;font-size:1rem;color:#7c6f64">' + esc(q.optOut) + '</div>';
    else head = '<div style="color:#a8a29e;font-size:.92rem">← Glisse le curseur pour répondre →</div>';

    var ticks = "";
    opts.forEach(function(opt, i){
      var active = idx === i;
      var col = active ? scaleColor(n <= 1 ? 0 : i / (n - 1)) : "#a8a29e";
      ticks += '<span class="slider-tick' + (i === 0 || i === n - 1 ? "" : " slider-tick--mid") + '" data-act="pick" data-val="' + attr(opt) + '" style="cursor:pointer;font-size:.72rem;color:' + col + ';font-weight:' + (active ? 700 : 400) + ';text-align:center;flex:1;line-height:1.25">' + esc(opt) + '</span>';
    });

    return '<div style="padding:.5rem .25rem .25rem">' +
      '<div id="slHead" style="text-align:center;margin-bottom:2rem;min-height:4rem;display:flex;flex-direction:column;align-items:center;justify-content:center">' + head + '</div>' +
      '<div id="slTrack" style="position:relative;padding:10px 0;opacity:' + (optOutSel ? .35 : 1) + ';transition:opacity .2s">' +
        '<div id="slSpectrum" style="height:8px;border-radius:99px;background:linear-gradient(to right,#ef4444,#f97316,#eab308,#84cc16,#22c55e);opacity:' + (onScale ? 1 : .3) + ';transition:opacity .2s"></div>' +
        '<div id="slFilled" style="position:absolute;top:10px;left:' + pct + '%;right:0;height:8px;border-radius:0 99px 99px 0;background:#ece5df;display:' + (onScale ? "block" : "none") + '"></div>' +
        '<input type="range" id="sliderRange" min="0" max="' + (n - 1) + '" value="' + (onScale ? idx : Math.floor((n - 1) / 2)) + '" class="slider-input">' +
        '<div id="slThumb" style="position:absolute;top:50%;left:calc(' + (onScale ? pct : 50) + '% - 15px);transform:translateY(-50%);width:30px;height:30px;border-radius:50%;background:' + C + ';border:3px solid #fff;box-shadow:0 3px 12px rgba(0,0,0,.28);transition:left .1s,background .2s;pointer-events:none;z-index:1"></div>' +
      '</div>' +
      '<div id="slTicks" style="display:flex;justify-content:space-between;margin-top:.8rem;gap:.3rem">' + ticks + '</div>' +
      (q.optOut ? '<div style="margin-top:1.5rem;text-align:center"><button data-act="pick" data-val="' + attr(q.optOut) + '" style="padding:.5rem 1.2rem;border-radius:99px;border:2px solid ' + (optOutSel ? "#ea580c" : "#ece5df") + ';background:' + (optOutSel ? "#fff3ec" : "#fff") + ';color:' + (optOutSel ? "#9a3412" : "#7c6f64") + ';font-size:.85rem;font-weight:' + (optOutSel ? 600 : 400) + '">' + esc(q.optOut) + '</button></div>' : '') +
    '</div>';
  }

  function updateSlider(){
    var q = QUESTIONS[state.step], opts = q.options, n = opts.length;
    var val = state.answers[q.id];
    var idx = (val !== undefined) ? opts.indexOf(val) : -1;

  function singleHTML(q, val){
    var h = '<div class="stagger" style="display:flex;flex-direction:column;gap:.6rem">';

  function multiHTML(q, val){

          '<h2 style="font-weight:600;font-size:clamp(1.2rem,4.2vw,1.4rem);color:#3c2a21;margin:1.4rem 0 1.6rem;line-height:1.4">' + esc(q.question) + '</h2>' +
          body +
          '<div style="display:flex;justify-content:space-between;margin-top:2rem;align-items:center;gap:.8rem">' +
            '<button class="btn-pill" data-act="prev"' + (isFirst ? " disabled" : "") + '>← Précédent</button>' +
            '<button class="next-btn" id="nextBtn" data-act="next"' + (ok ? "" : " disabled") + '>' + (isLast ? "Envoyer ✓" : "Suivant →") + '</button>' +
          '</div>' +
        '</div>' +
      '</div>';
    wireQuestion();
  }

  function fallbackHTML(code){
    var err = state.send === "error";
    return '<div style="text-align:left;background:' + (err ? "#fef2f2" : "#fff3ec") + ';border:1px solid ' + (err ? "#fecaca" : "#fde4c8") + ';border-radius:12px;padding:1rem 1.1rem;margin-bottom:.5rem">' +
      (err
        ? '<div style="color:#b91c1c;font-size:.86rem;font-weight:600;margin-bottom:.5rem">L\'envoi automatique n\'a pas abouti. Dépose ton fichier manuellement&nbsp;:</div>'
        : '<div style="color:#9a3412;font-size:.88rem;font-weight:600;margin-bottom:.5rem">Dépôt du fichier</div>') +
      '<p style="font-size:.86rem;color:#57534e;line-height:1.55;margin:0 0 .7rem">Télécharge ton fichier <strong>climat-' + esc(code) + '.pdf</strong>, puis ouvre le dossier et glisse-le à l\'intérieur.</p>' +
      (DRIVE_URL ? '<a href="' + attr(DRIVE_URL) + '" target="_blank" rel="noopener noreferrer" style="display:block;padding:.75rem 1rem;border-radius:10px;background:#fff;border:2px solid #ea580c;color:#9a3412;font-weight:600;font-size:.88rem;text-decoration:none;text-align:center">📂 Ouvrir ' + esc(DRIVE_LABEL) + ' →</a>' : '') +
    '</div>';
  }

  function renderThankYou(){
    var code = state.code;
    var sent = state.send === "sent";
    var directUpload = !!UPLOAD_ENDPOINT;
    var inner;
    if(sent){
      inner = '<div style="background:#f0fdf4;border:1px solid #bbf7d0;border-radius:14px;padding:1.3rem 1.2rem;margin-bottom:1rem;color:#166534"><div style="font-size:2rem;margin-bottom:.3rem">✓</div><div style="font-weight:700;font-size:1.05rem;margin-bottom:.25rem">Questionnaire transmis&nbsp;!</div><div style="font-size:.9rem;line-height:1.5">Tes réponses ont bien été envoyées. Tu peux fermer la page.</div></div>';
    } else {
      var showFallback = state.send === "error" || !directUpload;
      inner =
        '<p style="font-size:.92rem;color:#7c6f64;margin-bottom:1rem">Transmets tes réponses à ton professeur&nbsp;:</p>' +
        '<button class="lift transmit" data-act="transmit"' + (state.send === "sending" ? " disabled" : "") + '><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>' + (state.send === "sending" ? "Envoi en cours…" : "Transmettre le questionnaire") + '</button>' +
        '<button class="dl" data-act="download"' + (state.exporting ? " disabled" : "") + '><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>' + (state.exporting ? "Génération…" : (state.downloaded ? "Fichier téléchargé ✓ — re-télécharger" : "Télécharger le questionnaire")) + '</button>' +
        (showFallback ? fallbackHTML(code) : '');
    }
    app.innerHTML =
      '<div class="screen"><div class="card stagger" style="max-width:480px;text-align:center">' +
        '<div class="pop" style="width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,#fb923c,#f43f5e);margin:0 auto 1.4rem;display:flex;align-items:center;justify-content:center;font-size:2.4rem;box-shadow:0 12px 30px rgba(234,88,12,.3)">🎉</div>' +
        '<h2 style="font-weight:600;font-size:clamp(1.6rem,6vw,2rem);color:#3c2a21;margin-bottom:.8rem">Merci beaucoup !</h2>' +
        '<p style="font-size:1rem;color:#7c6f64;line-height:1.6;margin-bottom:1.5rem">Tes réponses anonymes vont vraiment aider à rendre le lycée plus accueillant. 💛</p>' +
        '<div style="background:#fff8f0;border-radius:14px;padding:1.1rem;margin-bottom:1.2rem"><div style="font-size:.78rem;color:#7c6f64;text-transform:uppercase;letter-spacing:.08em;margin-bottom:.4rem">Ton code anonyme</div><div style="font-size:1.8rem;font-weight:700;color:#9a3412;letter-spacing:.18em">' + esc(code) + '</div></div>' +
        inner +
        '<button class="restart" data-act="restart">Recommencer</button>' +
      '</div></div>';
  }

  function render(){
    if(state.view === "intro") renderIntro();
    else if(state.view === "question") renderQuestion();
    else renderThankYou();
  }

  // ====== CÂBLAGE DES SAISIES ======
  function wireQuestion(){
    var q = QUESTIONS[state.step];
    var range = document.getElementById("sliderRange");
    if(range) range.addEventListener("input", function(){
      var idx = parseInt(range.value, 10);
      state.answers[q.id] = q.options[idx];
      saveAndFlash(); updateSlider(); refreshNext();
    });
    var oi = document.getElementById("otherInput");
    if(oi) oi.addEventListener("input", function(){ setOtherValue(oi.value); });
    var ta = document.getElementById("textAnswer");
    if(ta) ta.addEventListener("input", function(){ state.answers[q.id] = ta.value; saveAndFlash(); });
  }

  function setOtherValue(text){
    var q = QUESTIONS[state.step];
    if(q.type === "single"){ state.answers[q.id] = makeOther(text); }
    else {
      var v = Array.isArray(state.answers[q.id]) ? state.answers[q.id] : [];
      v = v.filter(function(x){ return !isOther(x) && x !== "__none__"; }).concat([makeOther(text)]);
      state.answers[q.id] = v;
    }
    saveAndFlash();
  }

  function focusOther(){
    requestAnimationFrame(function(){
      var i = document.getElementById("otherInput");
      if(i){ i.focus(); var v = i.value; i.value = ""; i.value = v; }
    });
  }

  // ====== HANDLERS ======
  function start(resume){
    if(resume){ var s = loadFromStorage(); if(s && s.answers) state.answers = s.answers; }
    state.view = "question"; state.step = 0; render();
  }
  // Saut conditionnel : la Q16 (« lesquels ? ») n'est posée que si l'élève
  // a répondu autre chose que « Non » à la Q15 (« connais-tu... ? »).
  function isSkipped(index){
    var q = QUESTIONS[index];
    if(q.id === "lesquelles") return state.answers["connait_ressources"] === "Non";
    return false;
  }
  function nextIndex(from){ var i = from + 1; while(i < TOTAL && isSkipped(i)) i++; return i; }
  function prevIndex(from){ var i = from - 1; while(i >= 0 && isSkipped(i)) i--; return i; }
  function visibleIndices(){ var a = []; for(var i = 0; i < TOTAL; i++){ if(!isSkipped(i)) a.push(i); } return a; }

  function goPrev(){ var p = prevIndex(state.step); if(p >= 0){ state.step = p; render(); } }
  function goNext(){
    var n = nextIndex(state.step);
    if(n >= TOTAL){
      state.view = "thankyou";
      if(!state.code) state.code = randomCode();
      state.send = "idle"; state.downloaded = false; render();
    } else { state.step = n; render(); }
  }
  function pick(val){ var q = QUESTIONS[state.step]; state.answers[q.id] = val; saveAndFlash(); render(); }
  function otherSingle(){
    var q = QUESTIONS[state.step], cur = state.answers[q.id];
    if(!isOther(cur)){ state.answers[q.id] = OTHER; saveAndFlash(); }
    render(); focusOther();
  }
  function toggleMulti(opt){
    var q = QUESTIONS[state.step];
    var v = Array.isArray(state.answers[q.id]) ? state.answers[q.id].slice() : [];
    if(q.type === "multi_with_none") v = v.filter(function(x){ return x !== "__none__"; });
    if(opt === OTHER){
      var has = v.some(isOther);
      v = has ? v.filter(function(x){ return !isOther(x); }) : v.concat([OTHER]);
    } else {
      v = (v.indexOf(opt) !== -1) ? v.filter(function(x){ return x !== opt; }) : v.concat([opt]);
    }
    state.answers[q.id] = v; saveAndFlash(); render();
    if(v.some(isOther)) focusOther();
  }
  function toggleNone(){
    var q = QUESTIONS[state.step];
    var v = Array.isArray(state.answers[q.id]) ? state.answers[q.id] : [];
    var has = v.indexOf("__none__") !== -1;
    state.answers[q.id] = has ? [] : ["__none__"];
    saveAndFlash(); render();
  }
  function gridSet(row, col){
    var q = QUESTIONS[state.step];
    var v = Object.assign({}, state.answers[q.id] || {});
    v[row] = col; state.answers[q.id] = v; saveAndFlash(); render();
  }
  function restart(){
    clearStorage();
    state.answers = {}; state.step = 0; state.view = "intro";
    state.send = "idle"; state.code = null; state.downloaded = false; state.exporting = false;
    render();
  }

  async function handleDownload(){
    state.exporting = true; render();
    try { await exportPDF(state.answers, state.code); state.downloaded = true; }
    catch(e){ alert("Erreur lors de la génération du PDF. Vérifie ta connexion internet."); }
    state.exporting = false; render();
  }
  async function handleTransmit(){
    if(!UPLOAD_ENDPOINT){
      if(!state.downloaded) await handleDownload();
      if(DRIVE_URL) window.open(DRIVE_URL, "_blank", "noopener");
      return;
    }
    state.send = "sending"; state.sendErr = ""; render();
    try { await uploadPdf(state.answers, state.code); state.send = "sent"; }
    catch(e){ state.send = "error"; state.sendErr = (e && e.message) ? e.message : "Échec de l'envoi"; }
    render();
  }

  // ====== DÉLÉGATION DES CLICS ======
  app.addEventListener("click", function(e){
    var t = e.target.closest("[data-act]");
    if(!t || t.disabled) return;
    switch(t.dataset.act){
      case "start": start(false); break;
      case "resume": start(true); break;
      case "prev": goPrev(); break;
      case "next": goNext(); break;
      case "pick": pick(t.dataset.val); break;
      case "other-single": otherSingle(); break;
      case "toggle": toggleMulti(t.dataset.val); break;
      case "togglenone": toggleNone(); break;
      case "grid": gridSet(t.dataset.row, t.dataset.col); break;
      case "download": handleDownload(); break;
      case "transmit": handleTransmit(); break;
      case "restart": restart(); break;
    }
  });

  render();
})();

</script>
</body>
</html>
